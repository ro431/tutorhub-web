<div class="min-h-screen flex items-center justify-center bg-slate-50 py-12 px-4 sm:px-6 lg:px-8 relative">
  <div class="absolute top-8 left-8">
    <a routerLink="/" class="text-indigo-600 font-bold hover:text-indigo-800 transition-colors flex items-center gap-2 bg-white px-4 py-2 rounded-lg shadow-sm border border-slate-200 hover:shadow-md">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
      Back to Home
    </a>
  </div>
  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border border-slate-100 p-8 animate-fade-in-up mt-12">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-extrabold text-slate-900">Create an Account</h2>
      <p class="mt-2 text-sm text-slate-600">Join Tutor Hub as a student or teacher</p>
    </div>
    
    <div class="mb-6 flex flex-col items-center justify-center">
      <div class="relative w-24 h-24 rounded-full bg-slate-100 border-4 border-slate-50 shadow-md flex items-center justify-center overflow-hidden mb-3 group">
        <img *ngIf="profilePreview(); else noPreview" [src]="profilePreview()" class="w-full h-full object-cover" />
        <ng-template #noPreview>
          <svg class="w-12 h-12 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
        </ng-template>
        <div class="absolute inset-0 bg-black bg-opacity-40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer">
          <label for="profileUpload" class="cursor-pointer text-white text-xs font-bold px-2 text-center pointer-events-auto">Upload Photo</label>
        </div>
        <input type="file" id="profileUpload" accept="image/*" class="hidden" (change)="onProfileSelect($event)">
      </div>
      <label for="profileUpload" class="text-sm font-medium text-indigo-600 hover:text-indigo-500 cursor-pointer">Choose Profile Picture</label>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
      <div>
        <label for="name" class="block text-sm font-medium text-slate-700 mb-1">Full Name</label>
        <input formControlName="name" type="text" id="name" placeholder="Enter your name" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-slate-900 placeholder-slate-400">
      </div>
      <div>
        <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
        <input formControlName="email" type="email" id="email" placeholder="Enter your email" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-slate-900 placeholder-slate-400">
      </div>
      <div>
        <label for="phone" class="block text-sm font-medium text-slate-700 mb-1">Phone Number</label>
        <input formControlName="phone" type="text" id="phone" placeholder="Enter your phone number" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-slate-900 placeholder-slate-400">
      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
        <input formControlName="password" type="password" id="password" placeholder="Create a password" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-slate-900 placeholder-slate-400">
      </div>
      <div>
        <label for="role" class="block text-sm font-medium text-slate-700 mb-1">Account Role</label>
        <select formControlName="role" id="role" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-slate-900">
          <option value="student">Student</option>
          <option value="teacher">Teacher</option>
        </select>
      </div>
      <button type="submit" [disabled]="loading() || form.invalid" class="w-full mt-6 bg-indigo-600 text-white font-bold py-3 rounded-lg shadow-md hover:bg-indigo-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
        <span *ngIf="form.invalid && !loading()">Fill all fields</span>
        <span *ngIf="!form.invalid && !loading()">Create Account</span>
        <span *ngIf="loading()">Registering...</span>
      </button>
    </form>
    <div class="mt-6 text-center">
      <p class="text-sm text-slate-600">Already have an account? <a routerLink="/login" class="font-bold text-indigo-600 hover:text-indigo-500">Login here</a></p>
    </div>
  </div>
</div>
