<div class="login-container relative">
  <div class="absolute top-8 left-8">
    <a routerLink="/" class="text-indigo-600 font-bold hover:text-indigo-800 transition-colors flex items-center gap-2 bg-white px-4 py-2 rounded-lg shadow-sm border border-slate-200 hover:shadow-md">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
      Back to Home
    </a>
  </div>
  <div class="modern-card animate-fade-in-up mt-12">
    <h2>Welcome Back to Tutor Hub</h2>
    <p class="subtitle">Please enter your credentials to login</p>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input class="input-field" formControlName="email" type="email" id="email" placeholder="Enter your email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input class="input-field" formControlName="password" type="password" id="password" placeholder="Enter your password">
      </div>
      <button type="submit" class="btn-primary" [disabled]="loading()">Login</button>
    </form>
    <p class="register-link">Don't have an account? <a routerLink="/register">Register here</a></p>
  </div>
</div>
